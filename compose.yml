services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meshmind}
      POSTGRES_USER: ${POSTGRES_USER:-meshmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meshmind}
    ports:
      - host_ip: 127.0.0.1
        target: 5432
        published: "${POSTGRES_PORT:-5432}"
        protocol: tcp
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - host_ip: 127.0.0.1
        target: 6379
        published: "${REDIS_PORT:-6379}"
        protocol: tcp
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
