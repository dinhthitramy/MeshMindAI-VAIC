# Install this file inside Nginx's http context, such as:
# /etc/nginx/conf.d/meshmind-ai.conf

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

# Exclude query strings so password-reset tokens do not enter access logs.
log_format meshmind '$remote_addr [$time_local] '
                    '"$request_method $uri $server_protocol" $status '
                    '$body_bytes_sent $request_time';

upstream meshmind_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name meshmind-ai.june8th.me;

    if ($host != meshmind-ai.june8th.me) { return 444; }
    return 301 https://meshmind-ai.june8th.me$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name meshmind-ai.june8th.me;
    server_tokens off;

    if ($host != meshmind-ai.june8th.me) { return 444; }

    ssl_certificate /etc/letsencrypt/live/meshmind-ai.june8th.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meshmind-ai.june8th.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    access_log /var/log/nginx/meshmind-ai.access.log meshmind;

    client_max_body_size 25m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        proxy_pass http://meshmind_app;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_set_header Host meshmind-ai.june8th.me;
        proxy_set_header X-Real-IP $remote_addr;
        # Overwrite, rather than append to, any client-supplied forwarding chain.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host meshmind-ai.june8th.me;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Required for App Router streaming and Suspense responses.
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
