name: Deploy to Remote Production Server

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}

    steps:
      - name: Configure SSH
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy application
        run: |
          ssh \
            -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "meshmindai@$DEPLOY_HOST" 'bash -se' <<'REMOTE'
          set -Eeuxo pipefail

          cd /opt/meshmind-ai
          git pull --ff-only origin main
          npm ci
          npm run build
          npm run db:migrate

          if sudo -n systemctl is-active --quiet meshmind-ai.service; then
            sudo -n systemctl restart meshmind-ai.service
            sudo -n systemctl is-active --quiet meshmind-ai.service
          fi
          REMOTE
